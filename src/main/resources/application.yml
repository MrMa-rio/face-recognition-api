server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: face-recognition-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_SERVER_PORT:8761}/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10

logging:
  level:
    com.eureka.face: DEBUG
    org.springframework: INFO
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.cloud.netflix.eureka: INFO
    org.bytedeco: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-size: 100MB
      max-history: 30
  file:
    name: logs/face-recognition-api.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: 'face-api'
      paths-to-match: '/api/v1/**'
      packages-to-scan: com.eureka.face